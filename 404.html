<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Hidden metadata not shown in the UI -->
  <meta name="planned-date" content="2026-06-19" />
  <meta name="start-timestamp" content="2026-06-08T22:15:00+02:00" />

  <!-- Machine-readable JSON-LD (also hidden from normal UI) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Coming Soon",
    "startTimestamp": "2026-06-08T22:15:00+02:00",
    "plannedDate": "2026-06-19"
  }
  </script>

  <!-- Favicon: simple green leaf SVG as data URI -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%2317a34a'/%3E%3Cpath d='M20 36c6-12 20-18 28-18-6 10-12 22-28 28 2-6 0-10 0-10z' fill='%23fff' opacity='0.12'/%3E%3C/svg%3E" />

  <title>Coming Soon</title>

  <style>
    :root{
      --bg:#f7fbf8;
      --card:#ffffff;
      --muted:#6b7280;
      --accent-start:#2ecc71;
      --accent-end:#16a34a;
      --shadow: 0 8px 24px rgba(18, 38, 22, 0.06);
      --radius:14px;
      --glass: rgba(255,255,255,0.6);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    html,body{
      height:100%;
      margin:0;
      background: linear-gradient(180deg, var(--bg), #ffffff);
      color:#0f172a;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:48px 20px;
    }

    .card{
      width:100%;
      max-width:920px;
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:36px;
      display:grid;
      grid-template-columns: 1fr 320px;
      gap:28px;
      align-items:center;
    }

    .left{
      padding-right:8px;
    }

    h1{
      margin:0 0 8px 0;
      font-size:28px;
      letter-spacing:-0.02em;
    }

    p.lead{
      margin:0 0 22px 0;
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
    }

    .progress-wrap{
      background: linear-gradient(180deg, rgba(22,163,74,0.06), rgba(22,163,74,0.02));
      padding:18px;
      border-radius:12px;
      border:1px solid rgba(16,185,129,0.06);
    }

    .bar{
      height:18px;
      background: linear-gradient(90deg, rgba(0,0,0,0.03), rgba(0,0,0,0.01));
      border-radius:10px;
      padding:3px;
      box-sizing:border-box;
    }

    .bar-inner{
      height:100%;
      width:0%;
      border-radius:8px;
      background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
      box-shadow: 0 6px 18px rgba(22,163,74,0.18), inset 0 -6px 12px rgba(255,255,255,0.06);
      transition: width 1.2s cubic-bezier(.2,.9,.2,1);
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding-right:10px;
      color:white;
      font-weight:600;
      font-size:13px;
      letter-spacing:0.01em;
    }

    .meta{
      margin-top:12px;
      display:flex;
      gap:12px;
      color:var(--muted);
      font-size:13px;
      align-items:center;
    }

    .right{
      text-align:center;
      padding-left:8px;
    }

    .logo{
      width:84px;
      height:84px;
      margin:0 auto 14px auto;
      border-radius:18px;
      background: linear-gradient(135deg, rgba(22,163,74,0.12), rgba(16,185,129,0.06));
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 6px 18px rgba(16,185,129,0.06);
    }

    .logo svg{ width:44px; height:44px; }

    .countdown{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
    }

    .small{
      font-size:12px;
      color:#94a3b8;
    }

    @media (max-width:880px){
      .card{ grid-template-columns: 1fr; padding:24px; gap:18px; }
      .right{ order:-1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card" role="main" aria-labelledby="coming-title">
      <section class="left" aria-hidden="false">
        <h1 id="coming-title">We are launching soon</h1>
        <p class="lead">Thanks for your patience. We are building something great and will be ready shortly. Below is the current progress of our work.</p>

        <div class="progress-wrap" aria-label="Project progress">
          <div class="bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="barInner" class="bar-inner">0.00%</div>
          </div>

          <div class="meta">
            <div><strong>Status</strong> <span class="small" id="statusText">Not started</span></div>
            <div><strong>Started</strong> <span class="small" id="startText">Today 22:15</span></div>
          </div>
        </div>

        <p class="small" style="margin-top:14px;">Subscribe for updates or check back later to see progress.</p>
      </section>

      <aside class="right" aria-hidden="false">
        <div class="logo" aria-hidden="true">
          <!-- small decorative SVG -->
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 2C8 6 6 9 6 12.5S8.5 20 12 22c3.5-2 6-6 6-9.5S16 6 12 2z" fill="#16a34a"/>
            <path d="M9 12c1-3 4-5 6-6" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>

        <div style="font-weight:700; font-size:18px;">Progress Tracker</div>
        <div class="countdown" id="countdownText">Waiting to start</div>
      </aside>
    </main>
  </div>

  <script>
    // Read hidden metadata
    const startMeta = document.querySelector('meta[name="start-timestamp"]').content;
    const plannedMeta = document.querySelector('meta[name="planned-date"]').content;

    const startTime = new Date(startMeta);
    // planned date end-of-day for progress calculation
    const plannedEnd = new Date(plannedMeta + 'T23:59:59+02:00');

    const barInner = document.getElementById('barInner');
    const statusText = document.getElementById('statusText');
    const startText = document.getElementById('startText');
    const countdownText = document.getElementById('countdownText');

    // Format start display (visible)
    const startDisplay = startTime.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    startText.textContent = startDisplay;

    function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

    function updateProgress(){
      const now = new Date();
      if (now < startTime){
        // Not started yet
        barInner.style.width = '0%';
        barInner.textContent = '0.00%';
        statusText.textContent = 'Not started';
        const diff = Math.max(0, Math.floor((startTime - now)/1000));
        const hrs = Math.floor(diff/3600);
        const mins = Math.floor((diff%3600)/60);
        const secs = diff%60;
        countdownText.textContent = `Starts in ${hrs}h ${mins}m ${secs}s`;
        requestAnimationFrame(updateProgress);
        return;
      }

      // After start: compute progress as fraction of time elapsed between start and planned end
      const total = plannedEnd - startTime;
      const elapsed = now - startTime;
      let percent = (elapsed / total) * 100;
      percent = clamp(percent, 0, 100);

      // Keep two decimals
      const display = percent.toFixed(2) + '%';
      barInner.style.width = percent + '%';
      barInner.textContent = display;

      // Status text
      if (percent < 1) statusText.textContent = 'Just started';
      else if (percent < 30) statusText.textContent = 'In progress';
      else if (percent < 70) statusText.textContent = 'Making good progress';
      else if (percent < 100) statusText.textContent = 'Nearly there';
      else statusText.textContent = 'Complete';

      // Countdown to planned date (visible)
      const remaining = Math.max(0, Math.floor((plannedEnd - now)/1000));
      const days = Math.floor(remaining / 86400);
      const hours = Math.floor((remaining % 86400) / 3600);
      const minutes = Math.floor((remaining % 3600) / 60);
      countdownText.textContent = `Estimated completion in ${days}d ${hours}h ${minutes}m`;

      // Update again every 1.5s for smoothness
      setTimeout(updateProgress, 1500);
    }

    // Initialize: show 0.00% until start time
    barInner.style.width = '0%';
    barInner.textContent = '0.00%';
    statusText.textContent = 'Not started';
    countdownText.textContent = 'Waiting to start';

    // Start the update loop
    updateProgress();
  </script>
</body>
</html>
